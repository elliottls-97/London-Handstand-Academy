# netlify.toml — London Handstand Academy
# Pins the functions directory and explicitly protects the serverless
# endpoints so Netlify Form Detection (or path ambiguity) can never
# intercept them and return an HTML page instead of JSON.

[build]
  functions = "netlify/functions"
  publish   = "."

# Force the subscribe function POST to always hit the function directly,
# never a Netlify-generated form-handler HTML response.
[[redirects]]
  from   = "/.netlify/functions/subscribe"
  to     = "/.netlify/functions/subscribe"
  status = 200
  force  = true

# Same protection for the coaching-apply function (when deployed).
[[redirects]]
  from   = "/.netlify/functions/coaching-apply"
  to     = "/.netlify/functions/coaching-apply"
  status = 200
  force  = true
